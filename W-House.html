<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-House</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="w-screen">
    <header class="w-full bg-white border-b border-gray-100 py-4">
        <div class="container mx-auto flex items-center justify-between px-12">
            <div class="shrink-0">
                <img class="cursor-pointer" src="/img/W-House_Logo.svg" alt="Logo" class="h-10">
            </div>
            <nav class="hidden lg:flex items-center gap-8 font-medium">
                <a href="#" class="text-black hover:text-orange-600">Услуги</a>
                <a href="#" class="text-black hover:text-orange-600">Продукция</a>
                <a href="#" class="text-black hover:text-orange-600">О компании</a>
                <a href="#" class="text-black hover:text-orange-600">Портфолио</a>
                <a href="#" class="text-black hover:text-orange-600">Вопрос-ответ</a>
                <a href="#" class="text-black hover:text-orange-600">Контакты</a>
            </nav>
            <div class="flex gap-4">
                <button
                    class="flex items-center gap-2 bg-orange-700 text-white px-5 py-2.5 rounded-lg hover:bg-orange-600 transition">
                    <img class="w-4 h-4" src="/img/Zz.svg" alt="">
                    <span class="text-sm">Заявка на замер</span>
                </button>
                <button
                    class="flex items-center gap-2 bg-blue-700 text-white px-5 py-2.5 rounded-lg hover:bg-blue-600 transition">
                    <img class="w-4 h-4" src="/img/Zr.svg" alt="">
                    <span class="text-sm">Заказать расчет</span>
                </button>
            </div>
        </div>
    </header>
    <section class="relative w-full min-h-[600px] flex items-center overflow-hidden bg-[#333349]">
        <div class="absolute inset-0 z-0">
            <img src="/img/combined-banner.png" alt="Фон" class="w-full h-full object-cover" />
            <div class="absolute inset-0 bg-[#333349]/30 mix-blend-multiply"></div>
        </div>
        <div class="container relative z-10 mx-auto px-6 lg:px-12 flex flex-col lg:flex-row items-center gap-[60px]">
            <div class="flex-1 text-center lg:text-left">
                <h1 class="text-4xl md:text-5xl font-bold mb-10 text-white leading-tight">
                    <span class="text-[#EF7F04]">Окна Хаус -</span><br />
                    <span class="font-thin">Профессиональный подход<br />к остеклению</span>
                </h1>
                <div class="flex flex-wrap gap-8">
                    <div class="flex flex-col items-left gap-3">
                        <div class="w-24 h-24 rounded-lg overflow-hidden">
                            <img src="/img/item1.png" alt="Описание 1" class="w-full h-full object-cover">
                        </div>
                        <span class="text-sm font-medium text-left text-white font-regular">Современные окна<br/>и балконные конструкции<br/>по доступным ценам</span>
                    </div>
                    <div class="flex flex-col items-left gap-3">
                        <div class="w-24 h-24 rounded-lg overflow-hidden">
                            <img src="/img/item2.png" alt="Описание 2" class="w-full h-full object-cover">
                        </div>
                        <span class="text-sm font-medium text-left text-white font-regular">Квалифицированный<br/>подход к решению задач<br/>любой сложности</span>
                    </div>
                    <div class="flex flex-col items-left gap-3">
                        <div class="w-24 h-24 rounded-lg overflow-hidden">
                            <img src="/img/item3.png" alt="Описание 3" class="w-full h-full object-cover">
                        </div>
                        <span class="text-sm font-medium text-left text-white font-regular">Гарантия<br/>высочайшего качества<br/>нашей продукции</span>
                    </div>
                </div>
            </div>
            <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
                <h2 class="text-2xl font-bold mb-6 text-gray-800 flex justify-center">Вызвать замершика на дом</h2>
                <div class="flex flex-col gap-4">
                    <input type="text" placeholder="Представьтесь, пожалуйста"
                        class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-500">
                    <input type="tel" placeholder="Номер телефона"
                        class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-500">
                    <input type="email" placeholder="E-mail"
                        class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-500">
                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" class="mt-1 w-4 h-4 accent-orange-600">
                        <span class="text-xs text-gray-500 leading-tight">
                            Согласен на обработку персональных данных в соответствии с политикой
                            конфиденциальности
                        </span>
                    </label>
                </div>
                <div class="mt-6">
                    <button
                        class="w-full bg-orange-600 text-white font-bold py-4 rounded-lg hover:bg-orange-700 transition duration-300 shadow-lg shadow-orange-200">
                        Отправить заявку
                    </button>
                </div>
                <div class="mt-6 flex justify-center">
                    <img src="/img/form-footer-image.png" alt="Декор" class="h-12 opacity-50">
                </div>
            </div>
        </div>
    </section>
</body>

</html>
